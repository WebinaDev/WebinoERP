# Production overlay:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Only `web` remains published; set APP_URL to the public origin.

version: "3.8"

services:
  backend:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      QUEUE_CONNECTION: redis

  frontend:
    environment:
      NODE_ENV: production

  worker:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      QUEUE_CONNECTION: redis

  scheduler:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

  backup:
    image: postgres:15-alpine
    profiles:
      - backup
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    networks:
      - webino_erp
    volumes:
      - pg_backups:/backups
    depends_on:
      - db
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /backups && pg_dump -h db -U ${POSTGRES_USER:-postgres} ${POSTGRES_DB:-webina_crm} > /backups/webina_crm_$$(date +%Y%m%d_%H%M).sql

volumes:
  pg_backups:
