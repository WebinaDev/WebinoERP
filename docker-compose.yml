version: '3.8'

services:
  # وب‌سرور اصلی و پروکسی
  nginx:
    image: nginx:alpine
    container_name: webina_nginx
    env_file:
      - .env
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./backend:/var/www/html/backend
      - ./frontend:/var/www/html/frontend
      - ./backend/storage:/var/www/html/backend/storage
    depends_on:
      app:
        condition: service_started
      web:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/api/v1/core/health/readiness > /dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - internal
    restart: unless-stopped

  # لاراول (Backend API)
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webina_backend
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-webina_crm}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_ENV: local
      APP_DEBUG: true
      QUEUE_CONNECTION: redis
      BROADCAST_CONNECTION: reverb
    volumes:
      - ./backend:/var/www/html
      - ./backend/storage:/var/www/html/storage
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'php artisan route:list --path=health > /dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # نکست جی‌اس (Frontend Dashboard)
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webina_frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://nginx/api
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - internal
    depends_on:
      - app
    restart: unless-stopped

  # دیتابیس
  db:
    image: postgres:15-alpine
    container_name: webina_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-webina_crm}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    ports:
      - "5432:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-webina_crm}']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ردیس (کش و صف)
  redis:
    image: redis:alpine
    container_name: webina_redis
    networks:
      - internal
    ports:
      - "6379:6379"
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webina_queue
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-webina_crm}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_ENV: local
      APP_DEBUG: "true"
      QUEUE_CONNECTION: redis
    volumes:
      - ./backend:/var/www/html
      - ./backend/storage:/var/www/html/storage
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600"

  reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webina_reverb
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      APP_ENV: local
      BROADCAST_CONNECTION: reverb
    volumes:
      - ./backend:/var/www/html
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped
    command: >
      sh -c "php artisan reverb:start --host=0.0.0.0 --port=8080"

  docs:
    build:
      context: ./docs-site
      dockerfile: Dockerfile
    container_name: webina_docs
    networks:
      - internal
    ports:
      - "3001:80"
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
